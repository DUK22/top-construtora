<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=./">
    <title>Pagina nao encontrada | Top Construtora</title>
    <style>
        :root {
            --color-primary: #193b35;
            --color-accent: #c9973d;
            --color-soft: #f4f1eb;
            --color-ink: #17211f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            align-items: center;
            background: var(--color-soft);
            color: var(--color-ink);
            display: grid;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }

        main {
            margin: 0 auto;
            max-width: 560px;
        }

        h1 {
            color: var(--color-primary);
            font-size: clamp(2rem, 7vw, 4rem);
            line-height: 1;
            margin: 0 0 16px;
        }

        p {
            color: #5d6863;
            margin: 0 0 28px;
        }

        a {
            background: var(--color-accent);
            border-radius: 8px;
            color: #1d170a;
            display: inline-flex;
            font-weight: 800;
            min-height: 48px;
            padding: 0 20px;
            align-items: center;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>Pagina nao encontrada</h1>
        <p>O endereco acessado nao existe ou foi movido. Voce sera redirecionado para a pagina inicial em alguns segundos.</p>
        <a href="./">Voltar para o inicio</a>
    </main>
</body>
</html>
